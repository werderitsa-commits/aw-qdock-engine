name: AW-Qdock HPC Docker Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from UI

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: GitHub free runners only come with ~14GB free memory. 
      # Because AW-Qdock requires 40GB+ to compile the NVIDIA/ESMFold layers, 
      # we MUST purge Android SDKs, .NET, and unused dependencies from the runner to free up ~35-40GB of solid space.
      - name: Maximize Build Environment Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push the massive HPC container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/aw-qdock-engine:latest
          # Limit layer caches so we don't accidentally spike runner storage mid-build
          no-cache: true 
